version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: asm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asm}
      POSTGRES_DB: ${POSTGRES_DB:-asm_platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: asm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: asm_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-asm}:${POSTGRES_PASSWORD:-asm}@postgres:5432/${POSTGRES_DB:-asm_platform}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: asm_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-asm}:${POSTGRES_PASSWORD:-asm}@postgres:5432/${POSTGRES_DB:-asm_platform}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
    # Nmap SYN scans and raw packet crafting need these caps instead of running the container fully privileged
    cap_add:
      - NET_RAW
      - NET_ADMIN

  frontend:
    build: ./frontend
    container_name: asm_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
